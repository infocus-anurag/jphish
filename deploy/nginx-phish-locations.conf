# ─────────────────────────────────────────────────────────────────────────────
# PHISH SITE  ->  CloudPanel  Sites > links.infocusit.in > Vhost
#
# This is the PUBLIC tracking + landing surface (NestJS phish-server on :3102).
# Create links.infocusit.in as a "Reverse Proxy" site in CloudPanel first, then
# REPLACE its default `location /` with the block below.
#
# The phish-server only exposes:  /t/o /t/c /t/r (tracking)  and  /p/:slug (landing).
# It intentionally has NO admin routes and shares no cookies with the admin site.
# ─────────────────────────────────────────────────────────────────────────────

location / {
    proxy_pass http://127.0.0.1:3102;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}
