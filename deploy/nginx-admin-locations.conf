# ─────────────────────────────────────────────────────────────────────────────
# ADMIN SITE  ->  CloudPanel  Sites > jphish.infocusit.in > Vhost
#
# CloudPanel's vhost has a `{{settings}}` / `location /` area inside the
# `server { ... }` block. REPLACE the default `location /` block with the
# blocks below. Keep everything CloudPanel generated ABOVE it (server_name,
# ssl_certificate lines, the http->https redirect server block, etc.).
#
# Order matters: most-specific prefixes first, `location /` last.
# ─────────────────────────────────────────────────────────────────────────────

# Admin REST API  ->  NestJS admin app on :3001
location /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

# Swagger API docs (optional — comment out to hide in prod)
location /swagger {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Bull queue dashboard (optional — protect or comment out in prod)
location /bull {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Everything else  ->  Next.js frontend on :3000
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}
