name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend (lint, type-check, unit + e2e, coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Type-check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Unit + e2e (with coverage)
        working-directory: backend
        run: npm run test:cov

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint, type-check, tests, coverage, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check

      - name: Unit tests + coverage
        working-directory: frontend
        run: npm run test:cov

      - name: Production build
        working-directory: frontend
        # Provide a placeholder API URL; the build only needs it to be defined.
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
        run: npm run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore

  docker:
    name: Docker images (build only, no push)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Backend + frontend must pass first so we don't waste time on a bad commit.
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          tags: jphish-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          tags: jphish-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  audit:
    name: npm audit (high+ severity only)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Don't block PRs on transitive vulns — surface them but allow merge.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --workspaces --include-workspace-root --audit-level=high
